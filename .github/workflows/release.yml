name: "Release"
on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: Release Notes extrahieren
        id: notes
        run: |
          node scripts/extract-notes.js
          node -e "
            const fs = require('fs');
            const body = fs.readFileSync('release_body.txt', 'utf8');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'body<<NOTES_EOF\n' + body + '\nNOTES_EOF\n');
          "

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "EBCL Moodle v__VERSION__"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
